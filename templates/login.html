<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coop Door — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 2rem;
      border: 1px solid #e8e8e4;
      width: 100%;
      max-width: 340px;
    }
    h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; }
    input[type="password"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
    }
    button {
      width: 100%;
      padding: 0.55rem;
      background: #198754;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { filter: brightness(0.9); }
    .error {
      margin-bottom: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: #f8d7da;
      border-radius: 4px;
      font-size: 0.85rem;
      color: #721c24;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🐔 Coop Door</h1>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="error">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="post">
      <input type="password" name="password" placeholder="Password" required autofocus autocomplete="current-password">
      <button type="submit">Log in</button>
    </form>
  </div>
</body>
</html>
